services:
  bff-backoffice:
    image: "bff_backoffice_${DISTRIBUTION:-dev}_${RELEASE_VERSION:-v1}"
    container_name: "bff_backoffice_${DISTRIBUTION:-dev}_${RELEASE_VERSION:-v1}"
    restart: unless-stopped
    build:
      context: ..
      dockerfile: bff-backoffice/src/Dockerfile
    env_file:
      - ./src/.env
      - ./src/.env.secrets
    ports:
      - "7011:7011"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7011/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.5"
